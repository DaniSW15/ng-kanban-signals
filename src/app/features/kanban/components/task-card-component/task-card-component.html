<div class="task-card" [attr.aria-label]="'Tarea: ' + task().title + ', prioridad ' + task().priority">
    <div class="task-header">
        <h3>{{ task().title }}</h3>
        <span class="priority-badge {{ task().priority }}" [attr.aria-label]="'Prioridad ' + task().priority">
            {{ task().priority === 'low' ? '🟢' : task().priority === 'medium' ? '🟡' : '🔴' }}
            {{ task().priority }}
        </span>
    </div>
    <p class="task-description">{{ task().description }}</p>
    <div class="task-actions">
        @switch (task().status) {
            @case ('toDo') {
                <button mat-stroked-button color="primary" class="move-btn" (click)="onMove('inProgress')" aria-label="Mover a En Progreso">→ Iniciar</button>
            }
            @case ('inProgress') {
                <button mat-button class="move-btn back-btn" (click)="onMove('toDo')" aria-label="Volver a Por Hacer">← Volver</button>
                <button mat-stroked-button color="primary" class="move-btn" (click)="onMove('done')" aria-label="Marcar como Hecho">✅ Completar</button>
            }
            @case ('done') {
                <button mat-button class="move-btn back-btn" (click)="onMove('inProgress')" aria-label="Reabrir en En Progreso">↺ Reabrir</button>
            }
        }
    </div>
    <div class="task-actions-secondary">
        <button mat-button color="accent" class="edit-btn" (click)="onEdit()" [attr.aria-label]="'Editar tarea ' + task().title">✏️ Editar</button>
        <button mat-button color="warn" class="delete-btn" (click)="onDelete(task().id)" [attr.aria-label]="'Eliminar tarea ' + task().title">🗑️ Eliminar</button>
    </div>
</div>
