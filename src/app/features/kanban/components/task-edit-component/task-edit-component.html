<h2 mat-dialog-title>Editar Tarea</h2>

<mat-dialog-content>
    <form [formRoot]="editFormSignal" class="edit-task-form" id="editForm">
        <mat-form-field appearance="outline">
            <mat-label>Título</mat-label>
            <input matInput [formField]="editFormSignal.title" placeholder="Título" />
        </mat-form-field>

        <mat-form-field appearance="outline">
            <mat-label>Descripción</mat-label>
            <textarea matInput [formField]="editFormSignal.description" placeholder="Descripción" rows="3"></textarea>
        </mat-form-field>

        <mat-form-field appearance="outline">
            <mat-label>Prioridad</mat-label>
            <mat-select [formField]="editFormSignal.priority">
                <mat-option value="low">🟢 Baja</mat-option>
                <mat-option value="medium">🟡 Media</mat-option>
                <mat-option value="high">🔴 Alta</mat-option>
            </mat-select>
        </mat-form-field>
    </form>
</mat-dialog-content>

<mat-dialog-actions align="end">
    <button mat-button type="button" (click)="closeModal()">Cancelar</button>
    <button mat-raised-button color="primary" type="submit" form="editForm" [disabled]="editFormSignal().invalid()">Guardar</button>
</mat-dialog-actions>
